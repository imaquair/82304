{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'chaineHistoire/css/styles.css' %}">
    <title>Enter Access Password</title>
</head>
<body>
    <div class="create_story_body">
        <h1>Create Access</h1>
        <p>Enter the password to open the create page.</p>
        {% if gate_error %}
        <ul class="form-errors">
            <li>{{ gate_error }}</li>
        </ul>
        {% endif %}
        <form method="post" action="{% url 'create' %}">
            {% csrf_token %}
            <label for="create_access_password" hidden>Password</label>
            <input
                type="password"
                id="create_access_password"
                name="create_access_password"
                placeholder="Password"
                required
            />
            <br><br>
            <input style="float:left;" type="submit" value="Enter">
        </form>
    </div>
</body>
</html>
