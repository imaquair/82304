{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'chaineHistoire/css/styles.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back" />
    <title>Chaine d'Histoires</title>
</head>
<body>
    <div class="create_story_body">
        <h1>Start a Story</h1>
        <form>
            <label for="title">Title</label>
            <span><input type="text" name="title"/></span><br><br>

            <label for="language">Language</label>
            <span><input type="text" name="text"/></span><br><br>

            <label for="text">Add Text or </label>
            <label for="record"> 
                <input type="button" value="Record">
            </label><br><br><br>
            <textarea name="text" placeholder="Type to start story" rows="3" cols="100" maxlength="200"></textarea><br><br>

            <a href="/"><span class="material-symbols-outlined">arrow_back</span></a>
            <input type="submit" value="Submit">
        </form>
    </div>
</body>
</html>
