{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="{% static 'chaineHistoire/css/styles.css' %}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=arrow_back" />
    <title>Chaine d'Histoires</title>
</head>
<body>
    <div class="create_story_body">
        <h1>The Story Library</h1>
        {% if stories %}
            <ul>
            {% for story in stories %}
                <li><a href="#">{{ story.title }}</a></li>
            {% endfor %}
            </ul>
        {% else %}
            <p>No stories yet</p>
        {% endif %}
    </div>
</body>
</html>
